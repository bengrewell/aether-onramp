---
- name: remove UERANSIM if already exist
  file:
    path: ueransim_onramp
    state: absent
  when: inventory_hostname in groups['ueransim_nodes']

- name: Clone UERANSIM repository
  git:
    repo: https://github.com/aligungr/UERANSIM.git
    dest: ueransim_onramp
    version: "{{ ueransim.version | default('v3.2.7') }}"
  when: inventory_hostname in groups['ueransim_nodes']

# Detect whether the managed node can reach upstream apt archives so
# the `update_cache` task below doesn't hard-fail on airgapped nodes.
# `set_fact` is host-scoped, so each host probes and caches its own
# result. Operators can set `airgapped: true` (or false) in inventory
# vars to skip the probe.
- name: probe upstream apt archive reachability
  ansible.builtin.uri:
    url: "{{ airgap_probe_url | default('http://archive.ubuntu.com/ubuntu/dists/' + ansible_distribution_release + '/Release', true) }}"
    method: HEAD
    timeout: 5
  register: _apt_probe
  failed_when: false
  changed_when: false
  when:
    - inventory_hostname in groups['ueransim_nodes']
    - airgapped is not defined

# Any HTTP 2xx/3xx response is treated as online (handles redirects
# and alternate success codes that a mirror or proxy might return).
- name: set airgapped fact
  ansible.builtin.set_fact:
    airgapped: "{{ _apt_probe.status is not defined or not (200 <= (_apt_probe.status | int) < 400) }}"
  when:
    - inventory_hostname in groups['ueransim_nodes']
    - airgapped is not defined

- name: update apt cache
  apt:
    update_cache: true
  when:
    - inventory_hostname in groups['ueransim_nodes']
    - not (airgapped | bool)
  become: true

- name: Install dependencies
  apt:
    name: "{{ item }}"
    state: present
  loop:
    - g++
    - pkg-config
    - libsctp-dev
    - iproute2
    - make
    - cmake
  when: inventory_hostname in groups['ueransim_nodes']
  become: true

- name: Build UERANSIM
  shell: cmake . && make
  args:
    chdir: ueransim_onramp
  when: inventory_hostname in groups['ueransim_nodes']

- name: Changing perm of "nr-binder", adding "+x"
  file:
    path: ueransim_onramp/build/nr-binder
    mode: u+x
  when: inventory_hostname in groups['ueransim_nodes']

- set_fact:
    subnet: "{{ core.upf.access_subnet | regex_replace('[0-9]+/24', '0/24') }}"
  when: inventory_hostname in groups['ueransim_nodes']

- name: configure static route for upf traffic on ueransim node
  command:
    argv:
      - ip
      - route
      - add
      - "{{ subnet }}"
      - via
      - "{{ core.amf.ip }}"
  become: true
  when: (inventory_hostname in groups['ueransim_nodes']) and (inventory_hostname not in groups['master_nodes']) and core.upf.multihop_gnb == false
